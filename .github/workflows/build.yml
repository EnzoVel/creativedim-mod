name: Build Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Debug - voir la structure des fichiers
        run: find . -name "*.gradle" -o -name "*.toml" | head -30

      - name: Build
        run: gradle build
        working-directory: creativedim

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: creativedim-1.0.0
          path: creativedim/build/libs/creativedim-1.0.0.jar
