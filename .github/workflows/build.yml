name: Build Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Debug - structure du repo
        run: |
          echo "=== Racine ==="
          ls -la
          echo "=== Recherche settings.gradle ==="
          find . -name "settings.gradle" 2>/dev/null

      - name: Build
        run: gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: creativedim-1.0.0
          path: "**/build/libs/creativedim-1.0.0.jar"
